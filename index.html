    <div class="card" id="dashboard">
        <div id="info">
            <p id="city">
                <i id="icon" class="fa-solid fa-location-crosshairs"></i> 
                <span>City Name, Area</span>
            </p>
            <p class="gray-text" id="condition">Weather Condition</p>
            <p id="temp"><span>45</span><sub>°C</sub></p>
            <p id="temp-feel">Feels Like: <span>42</span><sub> °C</sub></p>
            <p id="temp-details">H:  <span id="upper">75°</span> &nbsp &nbsp &nbsp L:  <span id="lower">58°</span></p>
        </div>
        <div id="mainIcon">
            <i class="fa-regular fa-moon weatherIcon" id="main-weather"></i>
        </div>
    </div>
    <div id="details">
        <div class="card" id="humidity">
            <button class="icon"><i class="fa-solid fa-droplet"></i></button>
            <span>Humidity</span>
            <p>15%</p>
        </div>
        <div class="card" id="wind">
            <button class="icon"><i class="fa-solid fa-wind"></i></button>
            <span>Wind Speed</span>
            <p>12 mph</p>
        </div>
        <div class="card" id="visibility">
            <button class="icon"><i class="fa-solid fa-eye-low-vision"></i></button>
            <span>Visibility</span>
            <p>10 mi</p>
        </div>
        <div class="card" id="pressure">
            <button class="icon"><i class="fa-solid fa-gauge-simple-high"></i></button>
            <span>Pressure</span>
            <p>30.2 hPa</p>
        </div>
    </div>
    <h3 class="gray-text">5-Day Forecast</h3>
    <div id="forecast">

            <p class="gray-text" id="day">Mon</p>
